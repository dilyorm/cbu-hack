spring.application.name=bank-asset-management

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bank_assets}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Server
server.port=${SERVER_PORT:8080}

# File upload for asset images
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Asset image storage (local fallback)
app.asset-images.directory=${ASSET_IMAGES_DIR:./asset-images}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0dG9rZW5nZW5lcmF0aW9uYW5kdmFsaWRhdGlvbg==}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Public URL (used for QR code links)
app.public-url=${PUBLIC_URL:http://localhost:3000}

# Google Gemini AI
app.gemini.enabled=${GEMINI_ENABLED:false}
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# AWS S3 Configuration
app.s3.enabled=${S3_ENABLED:false}
app.s3.access-key=${AWS_ACCESS_KEY_ID:}
app.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
app.s3.bucket=${AWS_S3_BUCKET:}
app.s3.region=${AWS_REGION:us-east-1}
app.s3.endpoint=${AWS_S3_ENDPOINT:}

# Logging
logging.level.com.bankasset=INFO
logging.level.org.hibernate.SQL=WARN

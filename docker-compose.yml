services:
  postgres:
    image: postgres:16-alpine
    container_name: bank-assets-db
    environment:
      POSTGRES_DB: bank_assets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank-assets-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bank_assets
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
      ASSET_IMAGES_DIR: /app/asset-images
      # JWT
      JWT_SECRET: ${JWT_SECRET:-dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0dG9rZW5nZW5lcmF0aW9uYW5kdmFsaWRhdGlvbg==}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      # Public URL for QR codes
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      # Gemini AI (optional)
      GEMINI_ENABLED: ${GEMINI_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      # S3 Storage (optional)
      S3_ENABLED: ${S3_ENABLED:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-}
    ports:
      - "8080:8080"
    volumes:
      - asset_images:/app/asset-images
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bank-assets-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  asset_images:
